<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 스터디룸 예약</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        :root {
            --hy-blue: #1D2475;
            --hy-blue-light: #2d3585;
            --hy-blue-soft: rgba(29, 36, 117, 0.08);
            --hy-gray: #3F3D42;
            --hy-gray-light: #6B6B70;
        }
        * { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body {
            min-height: 100vh;
            background: #f5f6fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-box {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.03);
            padding: 3rem;
            max-width: 440px;
            width: 100%;
        }
        .login-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
        }
        .login-wrap .btn-google,
        .login-wrap .alert { width: 100%; }
        .login-icon {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            background: linear-gradient(180deg, #2d3585 0%, var(--hy-blue) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
        }
        .login-icon span {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.02em;
        }
        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--hy-gray);
            line-height: 1.35;
            margin-bottom: 0.5rem;
        }
        .login-subtitle {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--hy-gray-light);
            margin-bottom: 2rem;
        }
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 24px;
            border-radius: 12px;
            border: 1.5px solid #e0e0e0;
            background: #fff;
            font-weight: 500;
            color: var(--hy-gray);
            transition: all 0.2s ease;
        }
        .btn-google:hover {
            background: var(--hy-blue-soft);
            border-color: var(--hy-blue);
            color: var(--hy-blue);
        }
        .alert {
            border-radius: 12px;
            border: none;
            margin-bottom: 1rem;
        }
        .login-hint {
            font-size: 0.8rem;
            color: var(--hy-gray-light);
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-box">
    <div class="login-wrap">
        <div class="login-icon"><span>H</span></div>
        <h1 class="login-title">한양대학교 사범대학</h1>
        <p class="login-subtitle">스터디룸 & DCELL 예약 시스템</p>
        {% if error == "domain" %}
            <div class="alert alert-danger py-3" role="alert">
                한양대학교(@hanyang.ac.kr) 이메일로만 로그인할 수 있습니다.
            </div>
            {% elif error == "token" %}
            <div class="alert alert-warning py-3" role="alert">
                로그인 처리 중 오류가 발생했습니다. 다시 시도해 주세요.
            </div>
            {% endif %}
            <form action="/auth/google" method="GET" class="d-flex flex-column gap-3 w-100">
                <button type="submit" class="btn btn-google">
                    <svg width="22" height="22" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.16 7.09-10.27 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                    Google로 로그인
                </button>
            </form>
        <p class="login-hint mb-0">한양대학교 이메일만 사용 가능합니다</p>
    </div>
    </div>
</body>
</html>
