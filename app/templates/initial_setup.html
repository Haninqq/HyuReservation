<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 정보 입력 - 스터디룸 예약</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        :root {
            --hy-blue: #1D2475;
            --hy-blue-light: #2d3585;
            --hy-blue-soft: rgba(29, 36, 117, 0.08);
            --hy-gray: #3F3D42;
            --hy-gray-light: #6B6B70;
        }
        * { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body {
            min-height: 100vh;
            background: #f5f6fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .setup-box {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.03);
            padding: 3rem;
            max-width: 440px;
            width: 100%;
        }
        .setup-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
        }
        .setup-icon {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            background: linear-gradient(180deg, #2d3585 0%, var(--hy-blue) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
        }
        .setup-icon span {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.02em;
        }
        .setup-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--hy-gray);
            line-height: 1.35;
            margin-bottom: 0.5rem;
        }
        .setup-subtitle {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--hy-gray-light);
            margin-bottom: 2rem;
        }
        .setup-form { width: 100%; }
        .setup-option {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 1.5rem;
            border: 2px solid #e8e8ec;
            border-radius: 14px;
            margin-bottom: 0.75rem;
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--hy-gray);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .setup-option:hover {
            border-color: var(--hy-blue);
            background: var(--hy-blue-soft);
            color: var(--hy-blue);
        }
        .setup-option.selected {
            border-color: var(--hy-blue);
            background: var(--hy-blue-soft);
            color: var(--hy-blue);
        }
        .setup-option:active {
            transform: scale(0.98);
        }
        .btn-submit {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px 24px;
            margin-top: 1rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(180deg, #2d3585 0%, var(--hy-blue) 100%);
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-submit:hover {
            opacity: 0.9;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="setup-box">
        <div class="setup-wrap">
            <div class="setup-icon"><span>H</span></div>
            <h1 class="setup-title">회원 정보 입력</h1>
            <p class="setup-subtitle">서비스 이용을 위해 아래에서 해당하는 항목을 선택해 주세요</p>
            <form id="setupForm" action="/auth/complete_setup" method="POST" class="setup-form">
                <input type="hidden" name="is_graduate" id="isGraduateInput" value="0">
                <div class="setup-option selected" data-is-graduate="0">학부생</div>
                <div class="setup-option" data-is-graduate="1">대학원생</div>
                <button type="submit" class="btn-submit">시작하기</button>
            </form>
        </div>
    </div>
    <script>
        document.querySelectorAll('.setup-option').forEach(function(el) {
            el.addEventListener('click', function() {
                document.querySelectorAll('.setup-option').forEach(function(o) { o.classList.remove('selected'); });
                this.classList.add('selected');
                document.getElementById('isGraduateInput').value = this.dataset.isGraduate;
            });
        });
    </script>
</body>
</html>
